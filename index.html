<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DigitalMarket Pro - Bảng giá sản phẩm kỹ thuật số</title>
  <meta name="description" content="Website bảng giá sản phẩm kỹ thuật số hiện đại, chuẩn thương mại điện tử, responsive đẹp trên mọi thiết bị." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-soft: #dbeafe;
      --secondary: #0f172a;
      --accent: #f97316;
      --accent-soft: #ffedd5;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #f59e0b;
      --muted: #64748b;
      --muted-2: #94a3b8;
      --line: #e2e8f0;
      --bg: #f8fafc;
      --bg-soft: #f1f5f9;
      --white: #ffffff;
      --shadow-sm: 0 10px 30px rgba(15, 23, 42, 0.06);
      --shadow-md: 0 16px 40px rgba(15, 23, 42, 0.10);
      --shadow-lg: 0 20px 60px rgba(15, 23, 42, 0.14);
      --radius-sm: 10px;
      --radius: 18px;
      --radius-lg: 24px;
      --radius-xl: 32px;
      --container: 1320px;
      --transition: all 0.28s ease;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Inter", sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, #f8fafc 30%, #ffffff 100%);
      color: var(--secondary);
      line-height: 1.5;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      outline: none;
      border: none;
      background: none;
    }

    ul {
      list-style: none;
    }

    .container {
      width: min(100% - 32px, var(--container));
      margin: 0 auto;
    }

    .section {
      padding: 68px 0;
      position: relative;
    }

    .section-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: var(--primary);
      background: var(--primary-soft);
      padding: 8px 12px;
      border-radius: 999px;
      margin-bottom: 14px;
    }

    .title {
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--secondary);
      max-width: 760px;
    }

    .desc {
      font-size: 15px;
      color: var(--muted);
      max-width: 700px;
      margin-top: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 22px;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
      color: var(--white);
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.24);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 34px rgba(37, 99, 235, 0.28);
    }

    .btn-secondary {
      background: var(--white);
      color: var(--secondary);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
    }

    .btn-secondary:hover {
      border-color: rgba(37, 99, 235, 0.35);
      color: var(--primary);
      transform: translateY(-2px);
    }

    .btn-ghost {
      background: rgba(255,255,255,0.15);
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.24);
      backdrop-filter: blur(10px);
    }

    .topbar {
      background: linear-gradient(90deg, #1e3a8a 0%, #0f766e 100%);
      color: rgba(255,255,255,0.92);
      font-size: 13px;
      position: relative;
      z-index: 50;
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      min-height: 44px;
      flex-wrap: wrap;
      padding: 8px 0;
    }

    .topbar-links,
    .topbar-tools {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .topbar a {
      opacity: 0.92;
      transition: var(--transition);
    }

    .topbar a:hover {
      opacity: 1;
      color: #fff;
    }

    .topbar select {
      color: #fff;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 40;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(226,232,240,0.9);
    }

    .header-inner {
      display: grid;
      grid-template-columns: 240px minmax(280px, 1fr) auto;
      gap: 20px;
      align-items: center;
      min-height: 92px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      font-size: 22px;
      color: var(--secondary);
    }

    .logo-mark {
      width: 50px;
      height: 50px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
      display: grid;
      place-items: center;
      color: var(--white);
      font-size: 24px;
      box-shadow: 0 14px 28px rgba(37,99,235,0.28);
    }

    .logo-text small {
      display: block;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      margin-top: 2px;
    }

    .search-wrap {
      position: relative;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--white);
      border: 2px solid rgba(37,99,235,0.16);
      border-radius: 18px;
      box-shadow: var(--shadow-sm);
      padding: 10px 12px 10px 18px;
      transition: var(--transition);
    }

    .search-box:focus-within {
      border-color: rgba(37,99,235,0.48);
      box-shadow: 0 0 0 6px rgba(37,99,235,0.10);
    }

    .search-box input {
      flex: 1;
      min-width: 0;
      font-size: 15px;
      color: var(--secondary);
    }

    .search-box input::placeholder {
      color: var(--muted-2);
    }

    .search-btn {
      min-width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
      color: var(--white);
      cursor: pointer;
      font-size: 18px;
      display: grid;
      place-items: center;
      transition: var(--transition);
    }

    .search-btn:hover {
      transform: scale(1.03);
    }

    .header-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .icon-btn {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: var(--white);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--secondary);
      position: relative;
      transition: var(--transition);
    }

    .icon-btn:hover {
      transform: translateY(-2px);
      color: var(--primary);
      border-color: rgba(37,99,235,0.30);
    }

    .badge-dot {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--danger);
      border: 2px solid var(--white);
    }

    .login-btn {
      padding: 0 18px;
      width: auto;
      gap: 10px;
      font-weight: 700;
    }

    .navbar {
      background: var(--white);
      border-bottom: 1px solid rgba(226,232,240,0.85);
      position: relative;
      z-index: 35;
    }

    .navbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      min-height: 62px;
      flex-wrap: wrap;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-links a {
      padding: 11px 16px;
      border-radius: 12px;
      font-weight: 700;
      color: #334155;
      transition: var(--transition);
    }

    .nav-links a:hover,
    .nav-links a.active {
      background: var(--primary-soft);
      color: var(--primary);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      flex-wrap: wrap;
    }

    .nav-chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--bg-soft);
      color: var(--secondary);
    }

    .hero {
      padding: 26px 0 24px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 24px;
      align-items: stretch;
    }

    .hero-main {
      background:
        radial-gradient(circle at top left, rgba(96,165,250,0.26), transparent 30%),
        radial-gradient(circle at bottom right, rgba(129,140,248,0.22), transparent 30%),
        linear-gradient(135deg, #0f172a 0%, #1e293b 45%, #111827 100%);
      color: var(--white);
      border-radius: var(--radius-xl);
      overflow: hidden;
      position: relative;
      box-shadow: var(--shadow-lg);
      min-height: 520px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
    }

    .hero-content {
      padding: 42px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.15);
      width: fit-content;
      margin-bottom: 18px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3px;
      backdrop-filter: blur(10px);
    }

    .hero-title {
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.02;
      font-weight: 900;
      letter-spacing: -0.04em;
      margin-bottom: 18px;
      max-width: 620px;
    }

    .hero-title span {
      color: #93c5fd;
    }

    .hero-desc {
      max-width: 580px;
      color: rgba(255,255,255,0.82);
      font-size: 16px;
      margin-bottom: 26px;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .hero-points {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      max-width: 720px;
    }

    .hero-point {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 16px;
      backdrop-filter: blur(10px);
    }

    .hero-point strong {
      display: block;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .hero-point span {
      font-size: 13px;
      color: rgba(255,255,255,0.70);
    }

    .hero-visual {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .hero-card-stack {
      width: 100%;
      max-width: 420px;
      position: relative;
      min-height: 360px;
    }

    .floating-card {
      position: absolute;
      background: rgba(255,255,255,0.95);
      border-radius: 22px;
      box-shadow: 0 22px 50px rgba(15,23,42,0.25);
      color: var(--secondary);
      backdrop-filter: blur(8px);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.72);
    }

    .floating-card.card-a {
      width: 250px;
      padding: 20px;
      top: 10px;
      right: 40px;
      transform: rotate(7deg);
    }

    .floating-card.card-b {
      width: 290px;
      padding: 22px;
      left: 10px;
      bottom: 56px;
      transform: rotate(-8deg);
    }

    .floating-card.card-c {
      width: 220px;
      padding: 18px;
      bottom: 0;
      right: 8px;
      transform: rotate(4deg);
    }

    .floating-card .mini-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: var(--primary);
      font-weight: 800;
      margin-bottom: 8px;
    }

    .floating-card h4 {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .floating-card p {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .mini-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mini-tags span {
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--bg-soft);
      font-size: 12px;
      font-weight: 700;
      color: var(--secondary);
    }

    .hero-side {
      display: grid;
      gap: 24px;
      align-content: start;
    }

    .promo-card,
    .trust-card {
      background: var(--white);
      border: 1px solid rgba(226,232,240,0.85);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .promo-card {
      padding: 28px;
      position: relative;
      min-height: 248px;
      background:
        radial-gradient(circle at top right, rgba(59,130,246,0.12), transparent 25%),
        linear-gradient(135deg, #ffffff 0%, #f8fbff 100%);
    }

    .promo-card h3 {
      font-size: 28px;
      line-height: 1.15;
      font-weight: 900;
      margin-bottom: 14px;
      max-width: 380px;
    }

    .promo-card p {
      font-size: 14px;
      color: var(--muted);
      max-width: 430px;
      margin-bottom: 20px;
    }

    .promo-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .promo-pill {
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
      padding: 9px 12px;
      border-radius: 999px;
    }

    .promo-price {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .promo-price strong {
      font-size: 34px;
      line-height: 1;
      color: var(--danger);
      font-weight: 900;
    }

    .promo-price del {
      color: var(--muted-2);
      font-weight: 700;
    }

    .trust-card {
      padding: 22px;
    }

    .trust-card h4 {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .trust-list {
      display: grid;
      gap: 14px;
    }

    .trust-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px;
      border-radius: 18px;
      background: var(--bg);
      border: 1px solid rgba(226,232,240,0.85);
    }

    .trust-icon {
      flex: 0 0 46px;
      width: 46px;
      height: 46px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #dbeafe 0%, #e0e7ff 100%);
      color: var(--primary);
      font-size: 22px;
      font-weight: 900;
    }

    .trust-item h5 {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .trust-item p {
      font-size: 13px;
      color: var(--muted);
    }

    .ticker-wrap {
      margin-top: 24px;
      background: var(--white);
      border: 1px solid rgba(226,232,240,0.85);
      box-shadow: var(--shadow-sm);
      border-radius: 20px;
      overflow: hidden;
    }

    .ticker {
      display: flex;
      gap: 16px;
      padding: 14px;
      flex-wrap: wrap;
    }

    .ticker-item {
      flex: 1 1 220px;
      min-width: 220px;
      padding: 16px 18px;
      border-radius: 18px;
      background: linear-gradient(135deg, #ffffff 0%, #f8fbff 100%);
      border: 1px solid rgba(226,232,240,0.85);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .ticker-item .ticker-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: var(--accent-soft);
      color: var(--accent);
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 18px;
    }

    .ticker-item strong {
      display: block;
      font-size: 15px;
      font-weight: 800;
    }

    .ticker-item span {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-top: 3px;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 18px;
    }

    .category-card {
      background: var(--white);
      border: 1px solid rgba(226,232,240,0.85);
      border-radius: 24px;
      box-shadow: var(--shadow-sm);
      padding: 22px 18px;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      min-height: 170px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: space-between;
    }

    .category-card::before {
      content: "";
      position: absolute;
      inset: auto -20px -20px auto;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, rgba(59,130,246,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .category-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-md);
      border-color: rgba(37,99,235,0.28);
    }

    .category-icon {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      background: linear-gradient(135deg, #dbeafe 0%, #e0e7ff 100%);
      display: grid;
      place-items: center;
      font-size: 28px;
    }

    .category-card h3 {
      font-size: 17px;
      font-weight: 800;
      margin: 18px 0 6px;
    }

    .category-card p {
      font-size: 13px;
      color: var(--muted);
      min-height: 38px;
    }

    .category-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-top: 14px;
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
    }

    .pricing-shell {
      background:
        radial-gradient(circle at top left, rgba(96,165,250,0.12), transparent 25%),
        radial-gradient(circle at bottom right, rgba(129,140,248,0.12), transparent 30%),
        linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      border: 1px solid rgba(226,232,240,0.85);
      border-radius: 32px;
      padding: 30px;
      box-shadow: var(--shadow-md);
    }

    .pricing-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .pricing-badges {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pricing-badges span {
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      border: 1px solid rgba(226,232,240,0.85);
      background: var(--white);
      color: var(--secondary);
    }

    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
      align-items: stretch;
    }

    .plan-card {
      position: relative;
      background: var(--white);
      border: 1px solid rgba(226,232,240,0.92);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .plan-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-lg);
      border-color: rgba(37,99,235,0.26);
    }

    .plan-card.popular {
      border: 2px solid rgba(37,99,235,0.24);
      transform: scale(1.02);
      box-shadow: 0 24px 60px rgba(37,99,235,0.15);
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    }

    .plan-card.popular:hover {
      transform: scale(1.02) translateY(-8px);
    }

    .plan-ribbon {
      position: absolute;
      top: 18px;
      right: 18px;
      background: linear-gradient(135deg, #f97316 0%, #ef4444 100%);
      color: var(--white);
      padding: 9px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 12px 24px rgba(249,115,22,0.24);
      z-index: 3;
    }

    .plan-head {
      padding: 28px 28px 18px;
      border-bottom: 1px solid rgba(226,232,240,0.75);
      position: relative;
      overflow: hidden;
    }

    .plan-head::before {
      content: "";
