 <!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DigitalHub Store - Bảng giá sản phẩm kỹ thuật số</title>
  <meta
    name="description"
    content="Website bảng giá sản phẩm kỹ thuật số giao diện hiện đại, chuyên nghiệp, tối ưu bán hàng, có bảng giá chi tiết, danh mục, tìm kiếm, FAQ và danh sách sản phẩm đầy đủ."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --primary: #1d4ed8;
      --primary-2: #2563eb;
      --primary-3: #60a5fa;
      --secondary: #0f172a;
      --dark: #0b1220;
      --muted: #64748b;
      --light: #f8fafc;
      --border: #e2e8f0;
      --white: #ffffff;
      --danger: #ef4444;
      --success: #16a34a;
      --warning: #f59e0b;
      --purple: #7c3aed;
      --cyan: #06b6d4;
      --shadow-sm: 0 10px 30px rgba(15, 23, 42, 0.06);
      --shadow-md: 0 20px 45px rgba(15, 23, 42, 0.1);
      --shadow-lg: 0 30px 70px rgba(37, 99, 235, 0.16);
      --radius-sm: 12px;
      --radius-md: 18px;
      --radius-lg: 24px;
      --radius-xl: 30px;
      --container: 1280px;
      --transition: all 0.3s ease;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: #f3f7fd;
      color: var(--secondary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button,
    input,
    select {
      font-family: inherit;
    }

    ul {
      list-style: none;
    }

    .container {
      width: min(var(--container), calc(100% - 32px));
      margin: 0 auto;
    }

    .section {
      padding: 72px 0;
      position: relative;
    }

    .section-title-wrap {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.08);
      color: var(--primary);
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(28px, 3vw, 42px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .section-desc {
      max-width: 760px;
      color: var(--muted);
      font-size: 16px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: none;
      outline: none;
      cursor: pointer;
      white-space: nowrap;
      transition: var(--transition);
      font-weight: 700;
      border-radius: 14px;
      padding: 14px 22px;
      font-size: 15px;
    }

    .btn-primary {
      color: var(--white);
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 18px 30px rgba(37, 99, 235, 0.26);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 24px 40px rgba(37, 99, 235, 0.34);
    }

    .btn-outline {
      background: var(--white);
      color: var(--primary);
      border: 1px solid rgba(37, 99, 235, 0.16);
      box-shadow: var(--shadow-sm);
    }

    .btn-outline:hover {
      transform: translateY(-2px);
      border-color: rgba(37, 99, 235, 0.32);
    }

    .btn-dark {
      color: var(--white);
      background: linear-gradient(135deg, #0f172a, #1e293b);
      box-shadow: 0 18px 30px rgba(15, 23, 42, 0.24);
    }

    .topbar {
      background: linear-gradient(90deg, #1e3a8a, #2563eb, #0ea5e9);
      color: rgba(255, 255, 255, 0.92);
      font-size: 13px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .topbar-inner {
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      padding: 8px 0;
    }

    .topbar-left,
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .topbar-link,
    .topbar-select {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      transition: var(--transition);
    }

    .topbar-link:hover,
    .topbar-select:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    .site-header {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    .header-main {
      display: grid;
      grid-template-columns: 260px 1fr auto;
      align-items: center;
      gap: 24px;
      min-height: 92px;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      box-shadow: 0 16px 28px rgba(37, 99, 235, 0.24);
      position: relative;
      overflow: hidden;
    }

    .logo-icon::before,
    .logo-icon::after {
      content: '';
      position: absolute;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.75);
    }

    .logo-icon::before {
      width: 18px;
      height: 18px;
      top: 10px;
      left: 9px;
    }

    .logo-icon::after {
      width: 34px;
      height: 10px;
      bottom: 10px;
      right: 6px;
    }

    .logo-text h1 {
      font-size: 24px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--dark);
      margin-bottom: 4px;
    }

    .logo-text span {
      display: block;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .search-area {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .search-box {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 12px 10px 18px;
      background: #f8fbff;
      border: 2px solid rgba(37, 99, 235, 0.16);
      border-radius: 18px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      transition: var(--transition);
    }

    .search-box:focus-within {
      background: var(--white);
      border-color: rgba(37, 99, 235, 0.44);
      box-shadow: 0 16px 30px rgba(37, 99, 235, 0.08);
    }

    .search-box input {
      flex: 1;
      height: 46px;
      border: none;
      outline: none;
      background: transparent;
      font-size: 15px;
      color: var(--dark);
    }

    .search-box input::placeholder {
      color: #94a3b8;
    }

    .search-btn {
      min-width: 52px;
      height: 52px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      color: var(--white);
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      box-shadow: 0 16px 28px rgba(37, 99, 235, 0.22);
      transition: var(--transition);
      font-size: 18px;
    }

    .search-btn:hover {
      transform: translateY(-2px);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .action-btn {
      width: 50px;
      height: 50px;
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: var(--white);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--dark);
      font-size: 19px;
      position: relative;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      cursor: pointer;
    }

    .action-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(37, 99, 235, 0.28);
      color: var(--primary);
    }

    .action-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      min-width: 22px;
      height: 22px;
      border-radius: 999px;
      background: var(--danger);
      color: var(--white);
      font-size: 11px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 18px rgba(239, 68, 68, 0.3);
    }

    .login-chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 0 18px;
      height: 50px;
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: var(--white);
      font-weight: 700;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
    }

    .login-chip:hover {
      transform: translateY(-2px);
      border-color: rgba(37, 99, 235, 0.28);
      color: var(--primary);
    }

    .menu-bar {
      border-top: 1px solid rgba(148, 163, 184, 0.14);
      border-bottom: 1px solid rgba(148, 163, 184, 0.14);
      background: rgba(255, 255, 255, 0.98);
    }

    .menu-inner {
      min-height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .main-nav {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .main-nav a {
      padding: 12px 16px;
      border-radius: 12px;
      color: #334155;
      font-weight: 700;
      font-size: 15px;
      transition: var(--transition);
      position: relative;
    }

    .main-nav a.active,
    .main-nav a:hover {
      color: var(--primary);
      background: rgba(37, 99, 235, 0.08);
    }

    .support-meta {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .support-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #334155;
    }

    .support-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: rgba(37, 99, 235, 0.08);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-size: 18px;
    }

    .support-item small {
      display: block;
      color: #94a3b8;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .support-item strong {
      font-size: 14px;
      font-weight: 800;
    }

    .hero {
      padding: 32px 0 24px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.35fr 0.75fr;
      gap: 22px;
      align-items: stretch;
    }

    .hero-main {
      min-height: 560px;
      border-radius: 32px;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at top right, rgba(96, 165, 250, 0.34), transparent 28%),
        radial-gradient(circle at bottom left, rgba(56, 189, 248, 0.24), transparent 24%),
        linear-gradient(135deg, #09111f 0%, #0f172a 46%, #172554 100%);
      box-shadow: var(--shadow-lg);
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
    }

    .hero-content {
      padding: 54px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.94);
      font-size: 13px;
      font-weight: 700;
      backdrop-filter: blur(10px);
      margin-bottom: 18px;
    }

    .hero-title {
      font-size: clamp(36px, 4vw, 60px);
      line-height: 1.02;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.04em;
      margin-bottom: 18px;
    }

    .hero-title span {
      background: linear-gradient(90deg, #93c5fd, #67e8f9 60%, #ffffff);
